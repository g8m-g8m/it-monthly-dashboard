<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IT Dashboard — Pacific Pipe PLC</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Kanit', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    input { font-family: inherit; }

    .card { background: #1e293b; border-radius: 20px; padding: 48px 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.4); width: 400px; max-width: 92vw; }

    .logo { width: 60px; height: 60px; background: linear-gradient(135deg,#1e40af,#3b82f6); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 8px 24px rgba(59,130,246,.4); }
    .logo svg { display: block; }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 32px; }

    /* Login form */
    #login-section { display: block; }
    .field { text-align: left; margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .field input { width: 100%; padding: 11px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #f1f5f9; font-size: 14px; outline: none; transition: border-color .2s; }
    .field input:focus { border-color: #3b82f6; }
    .field input::placeholder { color: #475569; }
    .btn-login { width: 100%; padding: 13px; background: linear-gradient(135deg,#1e40af,#3b82f6); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity .2s; }
    .btn-login:hover { opacity: .9; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }
    .error-box { background: #450a0a; border: 1px solid #7f1d1d; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #fca5a5; margin-bottom: 16px; text-align: left; }

    /* Menu section */
    #menu-section { display: none; }
    .user-badge { display: flex; align-items: center; gap: 10px; background: #0f172a; border-radius: 12px; padding: 10px 14px; margin-bottom: 24px; text-align: left; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#1e40af,#3b82f6); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-info { flex: 1; }
    .user-name { font-size: 13px; font-weight: 600; color: #f1f5f9; }
    .user-role { font-size: 11px; color: #64748b; text-transform: capitalize; margin-top: 2px; }
    .btn-signout { background: none; border: none; cursor: pointer; color: #64748b; font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 6px; transition: color .2s; }
    .btn-signout:hover { color: #e11d48; }

    .menu-btn { display: flex; align-items: center; gap: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 14px; padding: 16px 18px; text-decoration: none; color: #f1f5f9; margin-bottom: 12px; transition: border-color .2s, background .2s; cursor: pointer; }
    .menu-btn:hover { background: #1e3a5f; border-color: #3b82f6; }
    .menu-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .menu-text { text-align: left; }
    .menu-title { font-size: 14px; font-weight: 600; color: #f1f5f9; }
    .menu-sub { font-size: 11px; color: #64748b; margin-top: 3px; }
    .menu-arrow { margin-left: auto; color: #475569; }

    .footer { font-size: 11px; color: #334155; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <h1>IT Monthly Dashboard</h1>
    <p class="subtitle">Pacific Pipe PLC · IT Department</p>

    <!-- Login -->
    <div id="login-section">
      <div id="error-box" class="error-box" style="display:none"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- Menu (shown after login) -->
    <div id="menu-section">
      <div class="user-badge">
        <div class="avatar" id="avatar-letter">U</div>
        <div class="user-info">
          <div class="user-name" id="user-name">User</div>
          <div class="user-role" id="user-role">viewer</div>
        </div>
        <button class="btn-signout" onclick="doLogout()">Sign Out</button>
      </div>

      <a href="./IT Dashboard.dc.html" class="menu-btn">
        <div class="menu-icon" style="background:linear-gradient(135deg,#1e40af,#3b82f6)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </div>
        <div class="menu-text">
          <div class="menu-title">IT Dashboard</div>
          <div class="menu-sub">ดูรายงานและ KPI รายเดือน</div>
        </div>
        <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <a href="./IT Data Entry.dc.html" class="menu-btn" id="entry-btn">
        <div class="menu-icon" style="background:linear-gradient(135deg,#059669,#10b981)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
        <div class="menu-text">
          <div class="menu-title">Data Entry</div>
          <div class="menu-sub">กรอกข้อมูลรายงานประจำเดือน</div>
        </div>
        <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
    </div>

    <div class="footer">Pacific Pipe PLC · IT Department · v2.0</div>
  </div>

  <script>
    const sb = window.getSupabaseClient ? window.getSupabaseClient() : null;

    async function init() {
      if (!sb) return;
      const { data: { session } } = await sb.auth.getSession();
      if (session) await showMenu(session);

      sb.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN') await showMenu(session);
        if (event === 'SIGNED_OUT') showLogin();
      });
    }

    async function showMenu(session) {
      const { data: profile } = await sb.from('profiles').select('full_name, role').eq('id', session.user.id).single();
      const name = profile?.full_name || session.user.email.split('@')[0];
      const role = profile?.role || 'viewer';

      document.getElementById('user-name').textContent = name;
      document.getElementById('user-role').textContent = role;
      document.getElementById('avatar-letter').textContent = name.charAt(0).toUpperCase();

      // Hide Data Entry for viewers
      if (role === 'viewer') {
        const eb = document.getElementById('entry-btn');
        eb.style.opacity = '.4';
        eb.style.pointerEvents = 'none';
        eb.querySelector('.menu-sub').textContent = 'ต้องการสิทธิ์ Editor ขึ้นไป';
      }

      document.getElementById('login-section').style.display = 'none';
      document.getElementById('menu-section').style.display = 'block';
    }

    function showLogin() {
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('menu-section').style.display = 'none';
    }

    async function doLogin() {
      if (!sb) return;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errBox = document.getElementById('error-box');

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errBox.style.display = 'none';

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errBox.textContent = error.message;
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function doLogout() {
      if (sb) await sb.auth.signOut();
    }

    // Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    init();
  </script>
</body>
</html>
