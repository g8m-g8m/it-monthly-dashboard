<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IT Dashboard — Pacific Pipe PLC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=72:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: '72', 'Segoe UI', 'Kanit', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    .wrap { width: 420px; max-width: 94vw; }

    /* Header brand */
    .brand { text-align: center; margin-bottom: 28px; }
    .brand-logo { width: 56px; height: 56px; background: #0070f2; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .brand-logo svg { display: block; }
    .brand-name { font-size: 20px; font-weight: 700; color: #1d2d3e; letter-spacing: -.01em; }
    .brand-sub { font-size: 13px; color: #6b7c8d; margin-top: 4px; }

    /* Card */
    .card { background: #fff; border-radius: 16px; padding: 36px 40px; box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04); }
    .card-title { font-size: 17px; font-weight: 700; color: #1d2d3e; margin-bottom: 24px; }

    /* Login form */
    #login-section { display: block; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #6b7c8d; margin-bottom: 6px; }
    .field input { width: 100%; padding: 10px 13px; background: #fff; border: 1px solid #d1d9e0; border-radius: 8px; color: #1d2d3e; font-size: 14px; font-family: '72','Segoe UI','Kanit',sans-serif; outline: none; transition: border-color .15s, box-shadow .15s; }
    .field input:focus { border-color: #0070f2; box-shadow: 0 0 0 3px rgba(0,112,242,.12); }
    .field input::placeholder { color: #a8b5c0; }
    .btn-login { width: 100%; padding: 11px; background: #0070f2; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: '72','Segoe UI','Kanit',sans-serif; cursor: pointer; margin-top: 8px; transition: background .15s; }
    .btn-login:hover { background: #0058c1; }
    .btn-login:disabled { background: #a8c8f8; cursor: not-allowed; }
    .error-box { background: #fff0f0; border: 1px solid #ffd0d0; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #c9190b; margin-bottom: 16px; }

    /* Menu section */
    #menu-section { display: none; }
    .user-badge { display: flex; align-items: center; gap: 10px; background: #f5f7f9; border-radius: 10px; padding: 10px 14px; margin-bottom: 20px; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: #0070f2; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-info { flex: 1; }
    .user-name { font-size: 13px; font-weight: 600; color: #1d2d3e; }
    .user-role { font-size: 11px; color: #6b7c8d; text-transform: capitalize; margin-top: 1px; }
    .role-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .role-admin { background: #e8f4ff; color: #0070f2; }
    .role-editor { background: #e8f9f0; color: #0a6640; }
    .role-viewer { background: #f5f5f5; color: #6b7c8d; }
    .btn-signout { background: none; border: none; cursor: pointer; color: #6b7c8d; font-size: 11px; font-weight: 600; font-family: '72','Segoe UI','Kanit',sans-serif; padding: 4px 8px; border-radius: 6px; transition: color .15s; }
    .btn-signout:hover { color: #c9190b; }

    .divider { font-size: 11px; font-weight: 600; color: #a8b5c0; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

    .menu-btn { display: flex; align-items: center; gap: 14px; background: #fff; border: 1px solid #e0e5ea; border-radius: 12px; padding: 14px 16px; text-decoration: none; color: #1d2d3e; margin-bottom: 10px; transition: border-color .15s, box-shadow .15s; }
    .menu-btn:hover { border-color: #0070f2; box-shadow: 0 0 0 3px rgba(0,112,242,.08); }
    .menu-icon { width: 40px; height: 40px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .menu-text { flex: 1; text-align: left; }
    .menu-title { font-size: 14px; font-weight: 600; color: #1d2d3e; }
    .menu-sub { font-size: 11px; color: #6b7c8d; margin-top: 2px; }
    .menu-arrow { color: #a8b5c0; flex-shrink: 0; }
    .menu-btn.disabled { opacity: .45; pointer-events: none; }

    .footer { font-size: 11px; color: #a8b5c0; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="brand-logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="brand-name">IT Monthly Dashboard</div>
      <div class="brand-sub">Pacific Pipe PLC · IT Department</div>
    </div>

    <div class="card">

      <!-- Login -->
      <div id="login-section">
        <div class="card-title">Sign In</div>
        <div id="error-box" class="error-box" style="display:none"></div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
      </div>

      <!-- Menu -->
      <div id="menu-section">
        <div class="user-badge">
          <div class="avatar" id="avatar-letter">U</div>
          <div class="user-info">
            <div class="user-name" id="user-name">User</div>
            <span class="role-badge" id="role-badge">viewer</span>
          </div>
          <button class="btn-signout" onclick="doLogout()">Sign Out</button>
        </div>

        <div class="divider">เลือกระบบ</div>

        <a href="./IT Dashboard.dc.html" class="menu-btn">
          <div class="menu-icon" style="background:#0070f2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </div>
          <div class="menu-text">
            <div class="menu-title">IT Dashboard</div>
            <div class="menu-sub">ดูรายงานและ KPI รายเดือน</div>
          </div>
          <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>

        <a href="./IT Data Entry.dc.html" class="menu-btn" id="entry-btn">
          <div class="menu-icon" style="background:#0a6640">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </div>
          <div class="menu-text">
            <div class="menu-title">Data Entry</div>
            <div class="menu-sub" id="entry-sub">กรอกข้อมูลรายงานประจำเดือน</div>
          </div>
          <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      </div>
    </div>
    <div class="footer">Pacific Pipe PLC · IT Department · v2.0</div>
  </div>

  <script>
    const sb = window.getSupabaseClient ? window.getSupabaseClient() : null;

    async function init() {
      if (!sb) return;
      const { data: { session } } = await sb.auth.getSession();
      if (session) await showMenu(session);
      sb.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN') await showMenu(session);
        if (event === 'SIGNED_OUT') showLogin();
      });
    }

    async function showMenu(session) {
      const { data: profile } = await sb.from('profiles').select('full_name, role').eq('id', session.user.id).single();
      const name = profile?.full_name || session.user.email.split('@')[0];
      const role = profile?.role || 'viewer';

      document.getElementById('user-name').textContent = name;
      document.getElementById('avatar-letter').textContent = name.charAt(0).toUpperCase();

      const rb = document.getElementById('role-badge');
      rb.textContent = role;
      rb.className = 'role-badge role-' + role;

      if (role === 'viewer') {
        document.getElementById('entry-btn').classList.add('disabled');
        document.getElementById('entry-sub').textContent = 'ต้องการสิทธิ์ Editor ขึ้นไป';
      }

      document.getElementById('login-section').style.display = 'none';
      document.getElementById('menu-section').style.display = 'block';
    }

    function showLogin() {
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('menu-section').style.display = 'none';
    }

    async function doLogin() {
      if (!sb) return;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errBox = document.getElementById('error-box');
      btn.disabled = true; btn.textContent = 'Signing in…'; errBox.style.display = 'none';
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errBox.textContent = error.message; errBox.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function doLogout() { if (sb) await sb.auth.signOut(); }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    init();
  </script>
</body>
</html>
