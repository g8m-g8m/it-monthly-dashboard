        {{ periodBadge }}
        {{ saveBtn }}
        {{ userBadge }}
      </div>

    <!-- Main Content -->
    <div style="flex:1;overflow-y:auto;padding:22px 24px;background:#eef2f7;font-size:14px">
      {{ formContent }}

      <div style="display:flex;gap:8px;align-items:center">
        {{ loadLatestBtn }}
        {{ submitBtn }}

  // Format a number with thousands separators; decimals=0 → integer, decimals=2 → always 2 decimal places
  fmtNum(n, decimals) {
    const d = decimals || 0;
    return (parseFloat(n) || 0).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
  }

  // Shared formatted number input: right-aligned, "#,##0" by default (pass decimals:2 for budget-style fields)
  numField(val, onChange, style, decimals) {
    const d = decimals || 0;
    const fmt = (n) => this.fmtNum(n, d);
    return this.e('input', {
      type: 'text',
      inputMode: d ? 'decimal' : 'numeric',
      value: fmt(val),
      onChange: (ev) => { const raw = ev.target.value.replace(/,/g, ''); onChange(parseFloat(raw) || 0); },
      onFocus: (ev) => { ev.target.value = String(parseFloat(val) || 0); },
      onBlur: (ev) => { ev.target.value = fmt(parseFloat(ev.target.value.replace(/,/g, '')) || 0); },
      style: Object.assign({ fontFamily: "'72','Inter','Kanit',sans-serif", border: 'none', background: 'transparent', outline: 'none', textAlign: 'right' }, style || {})
    });
  }

  updateProject(idx, field, val) {
    const projects = this.state.projects.map((p, i) => i === idx ? Object.assign({}, p, { [field]: val }) : p);
    this.setState({ projects });
  }

  updateBudget(idx, field, val) {
    const budget = this.state.budget.map((b, i) => i === idx ? Object.assign({}, b, { [field]: val }) : b);
    this.setState({ budget });
  }

  updateSecurity(field, val) {
    this.setState({ security: Object.assign({}, this.state.security, { [field]: val }) });
  }

  updateNetwork(idx, field, val) {
    const network = this.state.network.map((n, i) => i === idx ? Object.assign({}, n, { [field]: val }) : n);
    this.setState({ network });
  }

  updateUptime(field, val) {
    this.setState({ uptime: Object.assign({}, this.state.uptime, { [field]: val }) });
  }

  componentDidUpdate(prevProps, prevState) {
    const DATA_KEYS = ['period','projects','inhouse','budget','capexProjects','maData','security','vulns','securityEvents','network','networkKpis','networkKpiDefs','bizServices','statusKpis','uptime','uptimeItems','stabilityKpiDefs','changeRequests','riskRegister'];
    const changed = DATA_KEYS.some(k => prevState[k] !== this.state[k]);
    if (!changed) return;
    // Don't auto-save when only the period changed (switching periods — we're loading, not editing)
    if (prevState.period !== this.state.period) return;
    if (!this.state.dirty) this.setState({ dirty: true });
    if (this._autoSaveTimer) clearTimeout(this._autoSaveTimer);
    this._autoSaveTimer = setTimeout(() => {
      try {
        const s = this.state;
        const data = { period:s.period, projects:s.projects, inhouse:s.inhouse, budget:s.budget, capexProjects:s.capexProjects, maData:s.maData, security:s.security, vulns:s.vulns, securityEvents:s.securityEvents, network:s.network, networkKpis:s.networkKpis, networkKpiDefs:s.networkKpiDefs, bizServices:s.bizServices, statusKpis:s.statusKpis, uptime:s.uptime, uptimeItems:s.uptimeItems, stabilityKpiDefs:s.stabilityKpiDefs, changeRequests:s.changeRequests, riskRegister:s.riskRegister };
        const key = 'it_report_' + s.period.year + '_' + String(s.period.month).padStart(2,'0');
        localStorage.setItem(key, JSON.stringify(data));
        this.setState({ saveStatus: '💾 Auto-saved · ' + new Date().toLocaleTimeString() });
      } catch(_) {}
    }, 60);
  }

  async componentDidMount() {
    this._beforeUnload = (ev) => { if (this.state.dirty) { ev.preventDefault(); ev.returnValue = ''; } };
    window.addEventListener('beforeunload', this._beforeUnload);
    this._closePicker = () => {
      const upd = {};
      if(this.state.duePicker !== null) upd.duePicker = null;
      if(this.state.ihDuePicker !== null) upd.ihDuePicker = null;
      if(this.state.ihStartPicker !== null) upd.ihStartPicker = null;
      if(this.state.seDatePicker !== null) upd.seDatePicker = null;
      if(this.state.crDatePicker !== null) upd.crDatePicker = null;
      if(this.state.startPicker !== null) upd.startPicker = null;
      if(this.state.periodPickerOpen) upd.periodPickerOpen = false;
      if(Object.keys(upd).length) this.setState(upd);
    };
    document.addEventListener('click', this._closePicker);
    this._clockTick = () => {
      const now = new Date();
      const d = now.toLocaleDateString('th-TH', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
      const t = now.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      this.setState({ clockStr: d + '  ' + t });
    };
    this._clockTick();
    this._clockInterval = setInterval(this._clockTick, 1000);
    // Load custom types from localStorage
    try {
      const ct = JSON.parse(localStorage.getItem('it_custom_types') || '[]');
      if (ct.length) this.setState({ customTypes: ct });
    } catch(_) {}
    // Load non-system people directory (dev team leads without login) from localStorage
    try {
      const pp = JSON.parse(localStorage.getItem('it_people_directory') || '[]');
      if (pp.length) this.setState({ people: pp });
    } catch(_) {}
    // Save immediately when user switches tab or closes window
    this._saveNow = () => {
      try {
        const s = this.state;
        const data = { period:s.period, projects:s.projects, inhouse:s.inhouse, budget:s.budget, capexProjects:s.capexProjects, maData:s.maData, security:s.security, vulns:s.vulns, securityEvents:s.securityEvents, network:s.network, networkKpis:s.networkKpis, networkKpiDefs:s.networkKpiDefs, bizServices:s.bizServices, statusKpis:s.statusKpis, uptime:s.uptime, uptimeItems:s.uptimeItems, stabilityKpiDefs:s.stabilityKpiDefs, changeRequests:s.changeRequests, riskRegister:s.riskRegister };
        const key = 'it_report_' + s.period.year + '_' + String(s.period.month).padStart(2,'0');
        localStorage.setItem(key, JSON.stringify(data));
      } catch(_) {}
    };
    this._onVisibility = () => { if (document.visibilityState === 'hidden') this._saveNow(); };
    document.addEventListener('visibilitychange', this._onVisibility);
    window.addEventListener('beforeunload', this._saveNow);
    this._loadFromLocal();
    await this._sbInit();
  }
  componentWillUnmount() {
    document.removeEventListener('click', this._closePicker);
    if (this._clockInterval) clearInterval(this._clockInterval);
    document.removeEventListener('visibilitychange', this._onVisibility);
    window.removeEventListener('beforeunload', this._saveNow);
    if (this._rtChannel) this._rtChannel.unsubscribe();
  }

  // ── Supabase auth & data methods ─────────────────────────────────
  async _sbInit() {
    const sb = window.getSupabaseClient ? window.getSupabaseClient() : null;
    if (!sb) return;
    this._sb = sb;
    const { data: { session } } = await sb.auth.getSession();
    if (session) await this._onSignIn(session);
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN') await this._onSignIn(session);
      if (event === 'SIGNED_OUT') this.setState({ session: null, user: null, userRole: null, userName: '', userAvatar: '' });
    });
  }

  _defaultMenuAccess(role) {
    const DASH_TABS = ['overview','projects','uptime','network','security','budget'];
    const ENTRY_TABS = ['period','projects','inhouse','budget','security','secevents','network','netkpis','bizsvcs','statusovr','uptime','changereq','riskissues'];
    if (role === 'admin')  return { dashboard: DASH_TABS.slice(), data_entry: ENTRY_TABS.slice(), user_management: true };
    if (role === 'editor') return { dashboard: DASH_TABS.slice(), data_entry: ENTRY_TABS.slice(), user_management: false };
    return { dashboard: DASH_TABS.slice(), data_entry: [], user_management: false };
  }

  _normalizeMenuAccess(raw, role) {
    const def = this._defaultMenuAccess(role);
    if (!raw) return def;
    if (Array.isArray(raw)) { // back-compat with the old flat-array format
      return {
        dashboard: raw.includes('dashboard') ? def.dashboard : [],
        data_entry: raw.includes('data_entry') ? def.data_entry : [],
        user_management: raw.includes('user_management'),
      };
    }
    // Back-fill only the newly-added Risk & Issues tab for admins/editors whose
    // saved menu_access predates it — narrow fix so deliberately-restricted tabs
    // for other roles/users stay untouched.
    const dataEntry = Array.isArray(raw.data_entry) ? [...raw.data_entry] : [];
    if (def.data_entry.includes('riskissues') && !dataEntry.includes('riskissues')) dataEntry.push('riskissues');
    return {
      dashboard: Array.isArray(raw.dashboard) ? raw.dashboard : [],
      data_entry: dataEntry,
      user_management: !!raw.user_management,
    };
  }

  async _onSignIn(session) {
    const { data: profile } = await this._sb.from('profiles').select('*').eq('id', session.user.id).single();
    const role = profile?.role || 'viewer';
    const menuAccess = this._normalizeMenuAccess(profile?.menu_access, role);
    const nextTab = menuAccess.data_entry.includes(this.state.tab) ? this.state.tab : (menuAccess.data_entry[0] || 'period');
    this.setState({ session, user: session.user, userRole: role, userName: profile?.full_name || session.user.email, userAvatar: profile?.avatar_url || '', menuAccess, tab: nextTab, loginError: '' });
    this._loadOrgSettings();
    this._loadOrgUsers();
    // Always load latest period + data from DB on sign-in
    try {
      const { data: rows } = await this._sb.from('it_reports')
        .select('period_year,period_month,data')
        .order('period_year',{ascending:false}).order('period_month',{ascending:false}).limit(1);
      if (rows && rows[0]) {
        const period = { year: rows[0].period_year, month: rows[0].period_month };
        try { localStorage.setItem('it_active_period', JSON.stringify(period)); } catch(_) {}
        const d = rows[0].data;
        if (d) {
          const DEFAULT_TYPES = ['Infra','ERP/App','Security','Cloud','Continuity','Asset','Other'];
          const usedTypes = (d.projects||[]).map(p=>p.type).filter(t=>t&&!DEFAULT_TYPES.includes(t));
          const mergedCT = [...new Set([...this.state.customTypes, ...usedTypes])];
          this.setState({ ...d, period, customTypes: mergedCT, noDataForPeriod: false, saveStatus: '✓ โหลดเดือนล่าสุด ' + period.month + '/' + period.year });
        } else {
          this.setState({ period, noDataForPeriod: false });
        }
        setTimeout(() => this.setState({ saveStatus: '' }), 2500);
      } else {
        this.setState({ saveStatus: 'ℹ️ ยังไม่มีข้อมูลใน DB' });
        setTimeout(() => this.setState({ saveStatus: '' }), 2500);
      }
    } catch(_) {}
    this._subscribeRealtime();
  }

  async _loadLatestFromDB() {
    if (!this._sb || !this.state.session) { this.setState({ saveStatus: '⚠️ ยังไม่ได้เชื่อมต่อ' }); return; }
    this.setState({ saveStatus: '⏳ กำลังค้นหาข้อมูลล่าสุด…' });
    try {
      const { data: rows } = await this._sb.from('it_reports')
        .select('period_year,period_month,data')
        .order('period_year',{ascending:false}).order('period_month',{ascending:false}).limit(1);
      if (rows && rows[0]) {
        const period = { year: rows[0].period_year, month: rows[0].period_month };
        try { localStorage.setItem('it_active_period', JSON.stringify(period)); } catch(_) {}
        const d = rows[0].data;
        if (d) {
          const DEFAULT_TYPES = ['Infra','ERP/App','Security','Cloud','Continuity','Asset','Other'];
          const usedTypes = (d.projects||[]).map(p=>p.type).filter(t=>t&&!DEFAULT_TYPES.includes(t));
          const mergedCT = [...new Set([...this.state.customTypes, ...usedTypes])];
          this.setState({ ...d, period, customTypes: mergedCT, noDataForPeriod: false, saveStatus: '✓ โหลดเดือนล่าสุด ' + period.month + '/' + period.year });
        } else {
          this.setState({ period, noDataForPeriod: false, saveStatus: '✓ Period: ' + period.month + '/' + period.year });
        }
        setTimeout(() => this.setState({ saveStatus: '' }), 2500);
      } else {
        this.setState({ saveStatus: 'ℹ️ ยังไม่มีข้อมูลใน DB' });
        setTimeout(() => this.setState({ saveStatus: '' }), 2500);
      }
    } catch(err) {
      this.setState({ saveStatus: '❌ Error: ' + err.message });
      setTimeout(() => this.setState({ saveStatus: '' }), 3000);
    }
  }

  async _loadFromSupabase() {
    if (!this._sb || !this.state.session) return;
    // If a local draft already exists for this period, don't overwrite it with DB data
    try {
      const { period } = this.state;
      const key = 'it_report_' + period.year + '_' + String(period.month).padStart(2,'0');
      if (localStorage.getItem(key)) {
        this.setState({ loadingData: false });
        return; // Local draft takes priority until user submits
      }
    } catch(_) {}
    this.setState({ loadingData: true });
    const { period } = this.state;
    const { data } = await this._sb.from('it_reports').select('data').eq('period_year', period.year).eq('period_month', period.month).single();
    if (data?.data) {
      this.setState({ ...data.data, loadingData: false, saveStatus: '✓ Loaded from Supabase' });
      setTimeout(() => this.setState({ saveStatus: '' }), 3000);
    } else {
      this._loadFromLocal();
      this.setState({ loadingData: false });
    }
  }

  _loadPeriodData(overridePeriod) {
    const period = overridePeriod || this.state.period;
    // DB only — localStorage drafts are not trusted for period switching
    // Clear stale localStorage for this period key to prevent future issues
    try { localStorage.removeItem('it_report_' + period.year + '_' + String(period.month).padStart(2,'0')); } catch(_) {}
    if (this._sb && this.state.session) {
      this.setState({ loadingData: true, noDataForPeriod: false });
      this._sb.from('it_reports').select('data').eq('period_year', period.year).eq('period_month', period.month).single().then(({ data }) => {
        if (data?.data) {
          const DEFAULT_TYPES = ['Infra','ERP/App','Security','Cloud','Continuity','Asset','Other'];
          const usedTypes = (data.data.projects||[]).map(p=>p.type).filter(t=>t&&!DEFAULT_TYPES.includes(t));
          const mergedCT = [...new Set([...this.state.customTypes, ...usedTypes])];
          this.setState({ ...data.data, period, customTypes: mergedCT, loadingData: false, noDataForPeriod: false, saveStatus: '✓ โหลดข้อมูล ' + period.month + '/' + period.year + ' จาก DB' });
          setTimeout(() => this.setState({ saveStatus: '' }), 2000);
        } else {
          // No DB data — clear form
          this.setState({ ...this._getBlankFormState(), period, loadingData: false, noDataForPeriod: true, saveStatus: '' });
        }
      }).catch(() => {
        this.setState({ ...this._getBlankFormState(), period, loadingData: false, noDataForPeriod: true, saveStatus: '' });
      });
    } else {
      this.setState({ ...this._getBlankFormState(), period, noDataForPeriod: true });
    }
  }

  // Carry only unfinished work into the next period: drop fully-completed ad-hoc
  // tasks, and for Programs with a subtask checklist, drop finished subtasks and
  // recompute progress from what's left. Programs fully done (or with no subtasks
  // left) are dropped entirely — they stay recorded in the source month's history.
  _carryForwardInhouse(items) {
    return items.map(p => {
      if ((p.kind||'program') === 'adhoc') return p.progress >= 100 ? null : { ...p };
      if (Array.isArray(p.subtasks) && p.subtasks.length) {
        const remaining = p.subtasks.filter(t => !t.done);
        if (!remaining.length) return null; // all subtasks done — fully complete, don't carry
        return { ...p, subtasks: remaining, progress: 0, status: 'In Progress' };
      }
      return p.status === 'Completed' ? null : { ...p };
    }).filter(Boolean);
  }

  _copyPeriodData(fromMonth, fromYear, toPeriod) {
    if (this._sb && this.state.session) {
      this.setState({ copyStatus: '⏳ กำลังโหลดข้อมูลต้นทาง…' });
      this._sb.from('it_reports').select('data').eq('period_year', fromYear).eq('period_month', fromMonth).single().then(({ data }) => {
        if (data?.data) {
          const carriedInhouse = this._carryForwardInhouse(data.data.inhouse || []);
          const newData = { ...data.data, inhouse: carriedInhouse, period: toPeriod };
          const toKey = 'it_report_' + toPeriod.year + '_' + String(toPeriod.month).padStart(2,'0');
          try { localStorage.setItem(toKey, JSON.stringify(newData)); } catch(_) {}
          const DEFAULT_TYPES = ['Infra','ERP/App','Security','Cloud','Continuity','Asset','Other'];
          const usedTypes = (newData.projects||[]).map(p=>p.type).filter(t=>t&&!DEFAULT_TYPES.includes(t));
          const mergedCT = [...new Set([...this.state.customTypes, ...usedTypes])];
          this.setState({ ...newData, period: toPeriod, customTypes: mergedCT, noDataForPeriod: false, copyStatus: '✓ คัดลอกจาก ' + fromMonth + '/' + fromYear + ' เรียบร้อย' });
          setTimeout(() => this.setState({ copyStatus: '' }), 3000);
        } else {
          this.setState({ copyStatus: '⚠️ ไม่พบข้อมูลเดือน ' + fromMonth + '/' + fromYear + ' ใน DB' });
          setTimeout(() => this.setState({ copyStatus: '' }), 3000);
        }
      }).catch(() => {
        this.setState({ copyStatus: '❌ โหลดข้อมูลต้นทางไม่สำเร็จ' });
        setTimeout(() => this.setState({ copyStatus: '' }), 3000);
      });
    } else {
      this.setState({ copyStatus: '⚠️ ยังไม่ได้เชื่อมต่อ DB' });

  _resizeAvatarFile(file, size) {
    size = size || 160;
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext('2d');
          const s = Math.min(img.width, img.height);
          const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
          ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
          resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = reject;
        img.src = ev.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

      patchOS:'Patch Compliance (OS)', patchApps:'Patch Compliance (Apps)', criticalVulns:'Critical Vulnerabilities',

      latency:'Latency', bandwidthUtil:'Bandwidth Utilization', progress:'Progress %', status:'Status', budget:'Budget',
      actual:'Actual', name:'Name', dept:'Dept', lead:'Lead', availability:'Availability %', impact:'Impact',
      description:'Description', severity:'Severity', resolved:'Resolved', date:'Date', due:'Due Date',
      startDate:'Start Date', type:'Type', medium:'Medium', low:'Low', informational:'Informational'
    };
    return MAP[key] || key;
  }

  _fmtVal(v) { if (v === undefined || v === null || v === '') return '—'; if (typeof v === 'boolean') return v ? 'Yes' : 'No'; return String(v); }

  // Field-level diff for one top-level section; returns an array of human-readable change lines
  _diffSection(label, a, b) {
    const out = [];
    if (Array.isArray(a) || Array.isArray(b)) {
      const arrA = a || [], arrB = b || [];
      if (arrA.length !== arrB.length) out.push(label + ': ' + arrB.length + ' → ' + arrA.length + ' รายการ');
      for (let i = 0; i < Math.min(arrA.length, arrB.length); i++) {
        const itemA = arrA[i], itemB = arrB[i];
        if (typeof itemA !== 'object' || itemA === null) {
          if (JSON.stringify(itemA) !== JSON.stringify(itemB)) out.push(label + ' #' + (i+1) + ': ' + this._fmtVal(itemB) + ' → ' + this._fmtVal(itemA));
          continue;
        }
        const itemName = itemA.name || itemA.n || itemA.description || itemA.label || itemA.plant || ('#' + (i+1));
        Object.keys(itemA).forEach(k => {
          const av = itemA[k], bv = itemB ? itemB[k] : undefined;
          if (typeof av === 'object') return; // skip nested (e.g. payments) — too deep for a summary
          if (JSON.stringify(av) !== JSON.stringify(bv)) {
            out.push(label + ' · ' + itemName + ' — ' + this._fieldLabel(k) + ': ' + this._fmtVal(bv) + ' → ' + this._fmtVal(av));
          }
        });
      }
    } else if (typeof a === 'object' && a !== null) {
      Object.keys(a).forEach(k => {
        const av = a[k], bv = b ? b[k] : undefined;
        if (typeof av === 'object') return;
        if (JSON.stringify(av) !== JSON.stringify(bv)) {
          out.push(label + ' — ' + this._fieldLabel(k) + ': ' + this._fmtVal(bv) + ' → ' + this._fmtVal(av));
        }
      });
    } else if (JSON.stringify(a) !== JSON.stringify(b)) {
      out.push(label + ': ' + this._fmtVal(b) + ' → ' + this._fmtVal(a));
    }
    return out;
  }

  async loadHistory() {
    if (!this._sb || !this.state.session) return;
    const { period } = this.state;
    const { data } = await this._sb.from('it_report_versions').select('id, saved_by_name, saved_at, version_note, data').eq('period_year', period.year).eq('period_month', period.month).order('saved_at', { ascending: false }).limit(30);
    const rows = data || [];
    const DIFF_LABELS = {
      projects: 'Projects', inhouse: 'In-house Dev', budget: 'Budget', capexProjects: 'CapEx Projects',
      maData: 'M&A/Subscription', security: 'Security KPIs', vulns: 'Vulnerabilities', securityEvents: 'Security Events',
      network: 'Network', networkKpis: 'Network KPIs', networkKpiDefs: 'Network KPI Defs', bizServices: 'Business Services',
      statusKpis: 'Status Overall', uptime: 'Uptime', uptimeItems: 'Uptime Domains', stabilityKpiDefs: 'Stability KPIs',
      changeRequests: 'Change Requests', riskRegister: 'Risk & Issue Register'
    };
    const versions = rows.map((v, idx) => {
      const older = rows[idx + 1]; // next-older version (rows are newest-first)
      let changes = [];
      if (!older) {
        changes = ['บันทึกครั้งแรกของเดือนนี้'];
      } else if (v.data && older.data) {
        Object.keys(DIFF_LABELS).forEach(k => {
          const a = v.data[k], b = older.data[k];
          if (JSON.stringify(a ?? null) !== JSON.stringify(b ?? null)) {
            changes.push(...this._diffSection(DIFF_LABELS[k], a, b));
          }
        });
        if (!changes.length) changes = ['ไม่มีการเปลี่ยนแปลงข้อมูล'];
      } else {
        changes = ['ไม่สามารถเทียบข้อมูลเก่าได้'];
      }
      return { id: v.id, saved_by_name: v.saved_by_name, saved_at: v.saved_at, version_note: v.version_note, changes };
    });
    this.setState({ historyVersions: versions, showHistory: true });
  }

          historyVersions.map(v=>e('div',{key:v.id,style:{border:'1px solid #e2e8f0',borderRadius:12,padding:'14px',marginBottom:10}},
            e('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
              e('div',{style:{fontSize:12,fontWeight:600,color:'#0f172a'}},v.saved_by_name||'Unknown'),
              e('div',{style:{fontSize:11,color:'#94a3b8'}},new Date(v.saved_at).toLocaleString('th-TH'))
            ),
            v.version_note?e('div',{style:{fontSize:12,color:'#64748b',marginBottom:8}},v.version_note):null,
            v.changes && v.changes.length ? e('div',{style:{marginBottom:10}},
              ...v.changes.slice(0,8).map((c,i)=>e('div',{key:i,style:{fontSize:11,color:'#374151',padding:'3px 0',display:'flex',gap:6}},
                e('span',{style:{color:'#2563eb',flexShrink:0}},'•'),
                e('span',null,c)
              )),
              v.changes.length>8 ? e('div',{style:{fontSize:10.5,color:'#94a3b8',marginTop:2}}, '+' + (v.changes.length-8) + ' รายการเปลี่ยนแปลงเพิ่มเติม') : null
            ) : null,
            userRole!=='viewer'?e('button',{onClick:()=>this.restoreVersion(v.id),style:{background:'#eff6ff',border:'none',borderRadius:8,padding:'5px 12px',cursor:'pointer',fontSize:11,color:'#2563eb',fontWeight:600}},'Restore'):null
          ))
        )
      )
    ):null;

    const userBadge = session?e('div',{style:{display:'flex',alignItems:'center',gap:8}},
      e('div',{onClick:()=>this.openProfileModal(),title:'My Profile',tabIndex:0,onKeyDown:(ev)=>{ if(ev.key==='Enter') this.openProfileModal(); },style:{display:'flex',alignItems:'center',gap:8,background:'#f1f5f9',borderRadius:20,padding:'5px 12px',cursor:'pointer'}},
        userAvatar ? e('img',{src:userAvatar,style:{width:26,height:26,borderRadius:'50%',objectFit:'cover',flexShrink:0}}) :
        e('div',{style:{width:26,height:26,borderRadius:'50%',background:'linear-gradient(135deg,#1e40af,#3b82f6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff'}},(userName||'?').charAt(0).toUpperCase()),
        e('div',null,
          e('div',{style:{fontSize:11,fontWeight:600,color:'#0f172a',lineHeight:1.2}},userName),
          e('div',{style:{fontSize:10,color:'#64748b',textTransform:'capitalize'}},userRole)
        )
      ),
      e('button',{onClick:()=>this.loadHistory(),style:{background:'#f1f5f9',border:'none',borderRadius:10,padding:'5px 10px',cursor:'pointer',fontSize:11,color:'#475569',fontWeight:600}},'History'),
      e('button',{onClick:()=>this.doLogout(),style:{background:'#fff1f2',border:'none',borderRadius:10,padding:'5px 10px',cursor:'pointer',fontSize:11,color:'#e11d48',fontWeight:600}},'Sign Out')
    ):null;

    const submitBtn = e('button', {
      onClick: () => { this.handleSave(); },
      disabled: userRole === 'viewer',
      title: 'Submit Report',
      style: { display:'flex', alignItems:'center', gap:8, background:'#2563eb', color:'#fff', border:'none', borderRadius:22, padding:'9px 24px', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:"'72','Inter','Kanit',sans-serif", boxShadow:'0 2px 8px rgba(37,99,235,.4)' }
    },
      e('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round'}, e('path',{d:'M5 12h14M12 5l7 7-7 7'})),
      'Submit Report'
    );

    const { showAppMenu } = this.state;
    const appMenuBtn = e('div', null,
      e('div',{style:{fontSize:17,fontWeight:600,color:'#0f172a',letterSpacing:'-.01em'}}, tabs.find(t=>t.id===tab)?.label ? 'Data Entry — ' + tabs.find(t=>t.id===tab).label : 'Data Entry'),
      e('div',{style:{fontSize:11,color:'#94a3b8',marginTop:1}}, this.state.orgSettings.companyName + ' · IT Department')
    );

    const clockDisplay = e('div', { style: { fontSize: 12, color: '#64748b', fontWeight: 500, whiteSpace: 'nowrap', letterSpacing: '.01em' } }, this.state.clockStr);

    // ── My Profile modal (self-service: name, avatar, password) ───
    const profileModal = showProfileModal ? e('div',{onClick:()=>this.setState({showProfileModal:false}),style:{position:'fixed',inset:0,background:'rgba(15,23,42,.4)',zIndex:600,display:'flex',alignItems:'center',justifyContent:'center'}},
      e('div',{onClick:ev=>ev.stopPropagation(),style:{background:'#fff',borderRadius:16,padding:'28px',boxShadow:'0 20px 60px rgba(15,23,42,.2)',width:400,maxWidth:'92vw',fontFamily:"'72','Inter','Kanit',sans-serif"}},
        e('div',{style:{fontSize:17,fontWeight:700,color:'#0f172a',marginBottom:18}},'My Profile'),
        // Avatar
        e('div',{style:{display:'flex',justifyContent:'center',marginBottom:18}},
          e('div',{onClick:()=>document.getElementById('profile-avatar-input').click(),title:'เปลี่ยนรูป',style:{position:'relative',width:72,height:72,borderRadius:'50%',background:'#f1f5f9',border:'2px dashed #cbd5e1',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',overflow:'hidden'}},
            profileAvatarPreview ? e('img',{src:profileAvatarPreview,style:{width:'100%',height:'100%',objectFit:'cover'}}) :
            e('span',{style:{fontSize:24,fontWeight:700,color:'#94a3b8'}},(profileName||'?').charAt(0).toUpperCase()),
            e('input',{id:'profile-avatar-input',type:'file',accept:'image/*',style:{display:'none'},onChange:(ev)=>this.handleProfileAvatarFile(ev.target.files && ev.target.files[0])})
          )
        ),
        this.label('Full Name'),
        e('input',{type:'text',value:profileName,onChange:(ev)=>this.setState({profileName:ev.target.value}),style:{fontSize:14,color:'#374151',background:'#f9fafb',border:'1px solid #e5e7eb',borderRadius:8,padding:'8px 10px',width:'100%',outline:'none',fontFamily:"'72','Inter','Kanit',sans-serif",marginBottom:10}}),
        profileError ? e('div',{style:{fontSize:12,color:'#e11d48',marginBottom:8}},profileError) : null,
        profileSuccess ? e('div',{style:{fontSize:12,color:'#16a34a',marginBottom:8}},profileSuccess) : null,
        e('button',{onClick:()=>this.saveProfile(),disabled:profileSaving,style:{width:'100%',fontSize:14,fontWeight:600,color:'#fff',background:'#2563eb',border:'none',borderRadius:10,padding:'10px',cursor:'pointer',marginBottom:22}}, profileSaving?'Saving…':'Save Profile'),
        e('div',{style:{borderTop:'1px solid #f1f5f9',paddingTop:18}},
          e('div',{style:{fontSize:13,fontWeight:700,color:'#0f172a',marginBottom:10}},'Change Password'),
          e('input',{type:'password',placeholder:'New password',value:pwNew,onChange:(ev)=>this.setState({pwNew:ev.target.value}),style:{fontSize:14,color:'#374151',background:'#f9fafb',border:'1px solid #e5e7eb',borderRadius:8,padding:'8px 10px',width:'100%',outline:'none',fontFamily:"'72','Inter','Kanit',sans-serif",marginBottom:8}}),
          e('input',{type:'password',placeholder:'Confirm new password',value:pwConfirm,onChange:(ev)=>this.setState({pwConfirm:ev.target.value}),style:{fontSize:14,color:'#374151',background:'#f9fafb',border:'1px solid #e5e7eb',borderRadius:8,padding:'8px 10px',width:'100%',outline:'none',fontFamily:"'72','Inter','Kanit',sans-serif",marginBottom:10}}),
          pwError ? e('div',{style:{fontSize:12,color:'#e11d48',marginBottom:8}},pwError) : null,
          pwSuccess ? e('div',{style:{fontSize:12,color:'#16a34a',marginBottom:8}},pwSuccess) : null,
          e('button',{onClick:()=>this.changeMyPassword(),disabled:pwSaving,style:{width:'100%',fontSize:14,fontWeight:600,color:'#374151',background:'#f3f4f6',border:'none',borderRadius:10,padding:'10px',cursor:'pointer'}}, pwSaving?'Updating…':'Update Password')
        ),
        e('button',{onClick:()=>this.setState({showProfileModal:false}),style:{marginTop:16,width:'100%',fontSize:13,color:'#94a3b8',background:'none',border:'none',cursor:'pointer'}},'Close')
      )
    ) : null;

    return { periodBadge, tabNav, sidebarStyle, sidebarHeader, sidebarFooter, formContent, saveBtn, loadLatestBtn, submitBtn, saveStatus: saveStatus || 'กรุณากรอกข้อมูลและกด Submit Report', authOverlay, historyPanel, realtimeBanner, userBadge, appMenuBtn, clockDisplay, addTypeModal, addDeptModal, profileModal };
  }
}

</script>
</body>
</html>
