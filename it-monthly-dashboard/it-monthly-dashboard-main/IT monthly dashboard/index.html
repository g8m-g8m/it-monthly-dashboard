<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IT Dashboard — Pacific Pipe PLC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1e293b; border-radius: 20px; padding: 48px 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.4); max-width: 420px; width: 90%; }
    .logo { width: 60px; height: 60px; background: linear-gradient(135deg,#1e40af,#3b82f6); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 8px 24px rgba(59,130,246,.4); }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    p { font-size: 13px; color: #64748b; margin-bottom: 32px; }
    .btn { display: flex; align-items: center; gap: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 14px; padding: 16px 20px; text-decoration: none; color: #f1f5f9; margin-bottom: 12px; transition: border-color .2s, background .2s; }
    .btn:hover { background: #1e293b; border-color: #3b82f6; }
    .btn-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-text { text-align: left; }
    .btn-title { font-size: 14px; font-weight: 600; color: #f1f5f9; }
    .btn-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
    .footer { font-size: 11px; color: #475569; margin-top: 28px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <h1>IT Monthly Dashboard</h1>
    <p>Pacific Pipe PLC · IT Department</p>

    <a href="./IT Dashboard.dc.html" class="btn">
      <div class="btn-icon" style="background:linear-gradient(135deg,#1e40af,#3b82f6)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </div>
      <div class="btn-text">
        <div class="btn-title">IT Dashboard</div>
        <div class="btn-sub">ดูรายงานและ KPI รายเดือน</div>
      </div>
    </a>

    <a href="./IT Data Entry.dc.html" class="btn">
      <div class="btn-icon" style="background:linear-gradient(135deg,#059669,#10b981)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
      <div class="btn-text">
        <div class="btn-title">Data Entry</div>
        <div class="btn-sub">กรอกข้อมูลรายงานประจำเดือน</div>
      </div>
    </a>

    <div class="footer">Pacific Pipe PLC · IT Department · v2.0</div>
  </div>
</body>
</html>
