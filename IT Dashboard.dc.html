<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: '72'; src: url('https://ui5.sap.com/resources/sap/ui/core/themes/base/fonts/72-Light.woff2') format('woff2'); font-weight: 300; font-style: normal; unicode-range: U+0000-0E00, U+0E80-FFFF; }
    @font-face { font-family: '72'; src: url('https://ui5.sap.com/resources/sap/ui/core/themes/base/fonts/72-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; unicode-range: U+0000-0E00, U+0E80-FFFF; }
    @font-face { font-family: '72'; src: url('https://ui5.sap.com/resources/sap/ui/core/themes/base/fonts/72-SemiBold.woff2') format('woff2'); font-weight: 600; font-style: normal; unicode-range: U+0000-0E00, U+0E80-FFFF; }
    @font-face { font-family: '72'; src: url('https://ui5.sap.com/resources/sap/ui/core/themes/base/fonts/72-Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; unicode-range: U+0000-0E00, U+0E80-FFFF; }
    /* Kanit covers Thai script (U+0E00–U+0E7F) for all weights */
    @font-face { font-family: '72'; src: local('Kanit Light'), url('https://fonts.gstatic.com/s/kanit/v15/nKKZ-Go6G5tXcoaSEQGodLxA.woff2') format('woff2'); font-weight: 300; unicode-range: U+0E01-0E7F; }
    @font-face { font-family: '72'; src: local('Kanit Regular'), url('https://fonts.gstatic.com/s/kanit/v15/nKKU-Go6G5tXcr4WORWsFg.woff2') format('woff2'); font-weight: 400; unicode-range: U+0E01-0E7F; }
    @font-face { font-family: '72'; src: local('Kanit SemiBold'), url('https://fonts.gstatic.com/s/kanit/v15/nKKZ-Go6G5tXcoaSEQGodLxA.woff2') format('woff2'); font-weight: 600; unicode-range: U+0E01-0E7F; }
    @font-face { font-family: '72'; src: local('Kanit Bold'), url('https://fonts.gstatic.com/s/kanit/v15/nKKS-Go6G5tXcr48eAPFPQ.woff2') format('woff2'); font-weight: 700; unicode-range: U+0E01-0E7F; }
    * { box-sizing: border-box; }
    body { margin: 0; font-weight: 300; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    @keyframes ping { 0% { transform: scale(1); opacity: .6; } 70% { transform: scale(2); opacity: 0; } 100% { transform: scale(2); opacity: 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1, h2, h3, b, strong { font-family: '72', 'Kanit', sans-serif; font-weight: 600; }
    button:focus-visible, [tabindex]:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible { outline: 2px solid #2563eb !important; outline-offset: 2px; border-radius: 4px; }
  </style>
</helmet>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>

<div style="display:flex;height:100vh;overflow:hidden;font-family:'72', sans-serif;background:#eef2f7">

  <aside style="{{ sidebarStyle }}">
    {{ sidebarHeader }}
    <nav style="flex:1;padding:10px 8px;overflow-y:auto">
      {{ sidebarNav }}
    </nav>
    {{ sidebarFooter }}
  </aside>

  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0">
    <div style="background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      {{ appMenuBtn }}
      <div style="display:flex;align-items:center;gap:10px">
        {{ periodFilter }}
        {{ userBadge }}
        <button onClick="{{ printFn }}" title="Print Report" style="display:flex;align-items:center;justify-content:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:7px 10px;cursor:pointer;color:#475569"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg></button>
      </div>
    </div>
    <div style="flex: 1; overflow-y: auto; padding: 22px 24px; font-size: 14px">
      {{ mainContent }}
    </div>
  </div>

</div>

<div style="{{ tipStyle }}">{{ tipText }}</div>
{{ authOverlay }}{{ profileModal }}
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { tab: 'overview', tip: null, sidebarOpen: false, filterMonth: new Date().getMonth() + 1, filterYear: new Date().getFullYear(), filterOpen: false, showAppMenu: false,
    session: null, user: null, userRole: null, userName: '', userAvatar: '', menuAccess: null,
    loginEmail: '', loginPassword: '', loginLoading: false, loginError: '',
    supabaseData: null, loadingData: false, trendMonths: [], budgetHistoryRaw: [], budgetViewMode: 'cumulative',
    orgUsers: [], people: [], peopleMeta: {}, prgStatusFilter: '', bsInsightText: '', bsTopSpendText: '', bsWarningText: '',
    orgSettings: (function() { try { const c = JSON.parse(localStorage.getItem('it_org_branding')); if (c && c.companyName) return c; } catch(_) {} return { companyName: 'Pacificpipe PLC', divisionName: 'IT Division', logoLetter: 'P', logoColor: '#2563eb', logoUrl: '' }; })(),
    showProfileModal: false, profileName: '', profileAvatarPreview: '', profileSaving: false, profileError: '', profileSuccess: '',
    pwNew: '', pwConfirm: '', pwSaving: false, pwError: '', pwSuccess: '' };

  async componentDidMount() {
    // Sync period from shared localStorage key
    try {
      const p = JSON.parse(localStorage.getItem('it_active_period'));
      if (p?.month && p?.year) this.setState({ filterMonth: p.month, filterYear: p.year });
    } catch(_) {}
    // Close dropdown on outside click
    this._docClick = () => { if (this.state.filterOpen) this.setState({ filterOpen: false }); };
    document.addEventListener('click', this._docClick);
    const sb = window.getSupabaseClient ? window.getSupabaseClient() : null;
    if (!sb) return;
    this._sb = sb;
    const { data: { session } } = await sb.auth.getSession();
    if (session) await this._onSignIn(session);
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN') await this._onSignIn(session);
      if (event === 'SIGNED_OUT') this.setState({ session: null, user: null, userRole: null, userName: '', userAvatar: '', supabaseData: null });
    });
  }

  componentWillUnmount() {
    if (this._docClick) document.removeEventListener('click', this._docClick);
  }

  async componentDidUpdate(prevProps, prevState) {
    // Period changes are handled directly in the picker onClick — no action needed here
  }

  async _loadOrgUsers() {
    if (!this._sb) return;
    try {
      const { data } = await this._sb.from('profiles').select('id,full_name,avatar_url,email').order('full_name');
      if (data) this.setState({ orgUsers: data.map(u => ({ id: u.id, name: u.full_name || u.email, avatarUrl: u.avatar_url || '' })) });
    } catch (_) {}
  }

  // Combined lead directory: system users (from profiles) + non-system people (dev team, no login) — kept in sync with IT Data Entry
  getPeopleDirectory() {
    const sys = (this.state.orgUsers||[]).map(u => ({ name: u.name, avatarUrl: u.avatarUrl||'', isSystem: true }));
    const nonSys = (this.state.people||[])
      .filter(p => !sys.some(s => s.name.toLowerCase() === p.name.toLowerCase()))
      .map(p => ({ name: p.name, avatarUrl: p.avatarUrl||'', isSystem: false }));
    const meta = this.state.peopleMeta || {};
    return [...sys, ...nonSys].map(p => {
      const m = meta[p.name.toLowerCase()] || {};
      return { ...p, role: m.role || 'Member', reportsTo: m.reportsTo || '' };
    });
  }

  _defaultMenuAccess(role) {
    const DASH_TABS = ['overview','projects','uptime','network','security','budget','kpi'];
    const ENTRY_TABS = ['period','projects','inhouse','budget','security','secevents','network','netkpis','bizsvcs','statusovr','uptime','changereq'];
    if (role === 'admin')  return { dashboard: DASH_TABS.slice(), data_entry: ENTRY_TABS.slice(), user_management: true };
    if (role === 'editor') return { dashboard: DASH_TABS.slice(), data_entry: ENTRY_TABS.slice(), user_management: false };
    return { dashboard: DASH_TABS.slice(), data_entry: [], user_management: false };
  }

  _normalizeMenuAccess(raw, role) {
    const def = this._defaultMenuAccess(role);
    if (!raw) return def;
    if (Array.isArray(raw)) { // back-compat with the old flat-array format
      return {
        dashboard: raw.includes('dashboard') ? def.dashboard : [],
        data_entry: raw.includes('data_entry') ? def.data_entry : [],
        user_management: raw.includes('user_management'),
      };
    }
    return {
      dashboard: Array.isArray(raw.dashboard) ? raw.dashboard : [],
      data_entry: Array.isArray(raw.data_entry) ? raw.data_entry : [],
      user_management: !!raw.user_management,
    };
  }

  async _onSignIn(session) {
    const { data: profile } = await this._sb.from('profiles').select('*').eq('id', session.user.id).single();
    const role = profile?.role || 'viewer';
    const menuAccess = this._normalizeMenuAccess(profile?.menu_access, role);
    const nextTab = menuAccess.dashboard.includes(this.state.tab) ? this.state.tab : (menuAccess.dashboard[0] || 'overview');
    this.setState({ session, user: session.user, userRole: role, userName: profile?.full_name || session.user.email, userAvatar: profile?.avatar_url || '', menuAccess, tab: nextTab, loginError: '' });
    this._loadOrgSettings();
    this._loadOrgUsers();
    try {
      const pp = JSON.parse(localStorage.getItem('it_people_directory') || '[]');
      if (pp.length) this.setState({ people: pp });
    } catch(_) {}
    try {
      const pm = JSON.parse(localStorage.getItem('it_people_roles') || '{}');
      if (pm && Object.keys(pm).length) this.setState({ peopleMeta: pm });
    } catch(_) {}
    // Load latest period + data from DB (same logic as Data Entry)
    try {
      const { data: rows } = await this._sb.from('it_reports')
        .select('period_year,period_month,data')
        .order('period_year',{ascending:false}).order('period_month',{ascending:false}).limit(1);
      if (rows && rows[0]) {
        const fm = rows[0].period_month, fy = rows[0].period_year;
        try { localStorage.setItem('it_active_period', JSON.stringify({ month: fm, year: fy })); } catch(_) {}
        this._skipPeriodReload = true; // prevent componentDidUpdate from re-querying
        this.setState({ filterMonth: fm, filterYear: fy, supabaseData: rows[0].data || null, loadingData: false });
      } else {
        await this._loadData();
      }
    } catch(_) { await this._loadData(); }
    this._subscribeRealtime();
    this._loadTrendData();
  }

  async _loadData() {
    if (!this._sb || !this.state.session) return;
    this._loadSeq = (this._loadSeq || 0) + 1;
    const seq = this._loadSeq;
    const fm = this.state.filterMonth;
    const fy = this.state.filterYear;
    this.setState({ loadingData: true });
    try {
      const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000));
      const query = this._sb.from('it_reports').select('data').eq('period_year', fy).eq('period_month', fm).maybeSingle();
      const { data } = await Promise.race([query, timeout]);
      if (this._loadSeq === seq) {
        this.setState({ supabaseData: data?.data || null, loadingData: false });
      }
    } catch(_) {
      if (this._loadSeq === seq) {
        this.setState({ supabaseData: null, loadingData: false });
      }
    }
    this._loadTrendData();
  }

  // Real monthly history (up to the last 8 reported periods, ending at the currently viewed month)
  async _loadTrendData() {
    if (!this._sb || !this.state.session) return;
    const fy = this.state.filterYear, fm = this.state.filterMonth;
    try {
      const { data: rows } = await this._sb.from('it_reports').select('period_year,period_month,data')
        .or('period_year.lt.' + fy + ',and(period_year.eq.' + fy + ',period_month.lte.' + fm + ')')
        .order('period_year', { ascending: false }).order('period_month', { ascending: false }).limit(8);
      const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const months = (rows || []).slice().reverse().map(r => {
        const d = r.data || {};
        const net = d.network || [];
        const avgLatency = net.length ? net.reduce((s,n)=>s+(n.latency||0),0)/net.length : 0;
        const avgPacket  = net.length ? net.reduce((s,n)=>s+(n.packetLoss||0),0)/net.length : 0;
        const bandwidth  = (d.networkKpis && d.networkKpis.bandwidthUtil) || 0;
        const sec = d.security || {};
        return {
          label: MON[r.period_month-1] + ' ' + String(r.period_year).slice(2),
          latency: Math.round(avgLatency), packetLoss: Math.round(avgPacket*10)/10,
          bandwidthUtil: Math.round(bandwidth),
          allIncidents: sec.allIncidents || 0, criticalIncidents: sec.criticalIncidents || 0
        };
      });
      this.setState({ trendMonths: months, budgetHistoryRaw: rows || [] });
    } catch(_) { /* keep previous trend data on failure */ }
  }

  // Pure re-derivation of the Budget card's budGroups shape from a raw report `data` object —
  // shared by the current-month card and by historical snapshots (for MoM/QoQ comparison).
  _computeBudGroupsFromData(data) {
    const sdCap = data && data.capexProjects;
    const sdMA  = data && data.maData;
    if (sdCap) {
      sdCap.forEach(p => {
        (p.subs||[]).forEach(sub => {
          if (sub.payments && sub.payments.length) {
            sub.budget = sub.payments.reduce((s,pm)=>s+(pm.amt||0),0);
            sub.actual = sub.payments.reduce((s,pm)=>s+(pm.actualAmt||0),0);
          }
        });
      });
    }
    const budColors = ['#2563eb','#0ea5e9','#8b5cf6','#10b981','#f59e0b','#f97316','#64748b','#84cc16','#ec4899','#14b8a6'];
    let bci = 0;
    const nextColor = () => budColors[(bci++) % budColors.length];
    const capexBudGroups = (sdCap||[]).map(p => {
      const subs = p.subs||[];
      const categories = subs.length
        ? subs.map(s => ({ n: s.n, bg: (s.budget||0)/1e6, sp: (s.actual||0)/1e6, c: nextColor() }))
        : [];
      return { parent: p.n, type: 'CapEx', categories };
    });
    const opexBudGroups = sdMA ? [
      { parent: 'MA+Subscription Detail', type: 'OpEx', categories: (sdMA.maSub||[]).map(r => ({ n: r.n, bg: (r.bg||0)/1e6, sp: (r.act||0)/1e6, c: nextColor() })) },
      { parent: 'Software Subscription',  type: 'OpEx', categories: (sdMA.maDet||[]).map(g => {
          const b = g.items ? g.items.reduce((s,it)=>s+(it.budget||0),0) : (g.bg||0);
          const a = g.items ? g.items.reduce((s,it)=>s+(it.actual||0),0) : (g.act||0);
          return { n: g.n, bg: b/1e6, sp: a/1e6, c: nextColor() };
        }) },
    ].filter(g => g.categories.length) : [];
    return [...capexBudGroups, ...opexBudGroups];
  }

  // Find a matching {n, bg, sp} category by parent+name across a different period's budGroups
  _findBudCategory(budGroups, parentName, catName) {
    const g = (budGroups||[]).find(g => g.parent === parentName);
    if (!g) return null;
    return (g.categories||[]).find(c => c.n === catName) || null;
  }

  _subscribeRealtime() {
    if (this._rtChannel) this._rtChannel.unsubscribe();
    this._rtChannel = this._sb.channel('dash_rt').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'it_reports' }, () => {
      this._loadData();
    }).subscribe();
  }

  async doLogin() {
    if (!this._sb) return;
    this.setState({ loginLoading: true, loginError: '' });
    const { error } = await this._sb.auth.signInWithPassword({ email: this.state.loginEmail, password: this.state.loginPassword });
    if (error) this.setState({ loginError: error.message, loginLoading: false });
    else this.setState({ loginLoading: false, loginPassword: '' });
  }

  async doLogout() {
    if (this._rtChannel) this._rtChannel.unsubscribe();
    if (this._sb) await this._sb.auth.signOut();
  }

  async _loadOrgSettings() {
    if (!this._sb) return;
    try {
      const { data } = await this._sb.from('app_settings').select('*').eq('id', 1).maybeSingle();
      if (data) {
        const orgSettings = {
          companyName: data.company_name || 'Pacificpipe PLC',
          divisionName: data.division_name || 'IT Division',
          logoLetter: data.logo_letter || 'P',
          logoColor: data.logo_color || '#2563eb',
          logoUrl: data.logo_url || ''
        };
        this.setState({ orgSettings });
        try { localStorage.setItem('it_org_branding', JSON.stringify(orgSettings)); } catch(_) {}
      }
    } catch (_) { /* keep defaults on failure */ }
  }

  openProfileModal() {
    this.setState({ showProfileModal: true, profileName: this.state.userName, profileAvatarPreview: this.state.userAvatar, profileError: '', profileSuccess: '', pwNew: '', pwConfirm: '', pwError: '', pwSuccess: '' });
  }

  _resizeAvatarFile(file, size) {
    size = size || 160;
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext('2d');
          const s = Math.min(img.width, img.height);
          const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
          ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
          resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = reject;
        img.src = ev.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async handleProfileAvatarFile(file) {
    if (!file) return;
    try {
      const dataUrl = await this._resizeAvatarFile(file, 160);
      this.setState({ profileAvatarPreview: dataUrl });
    } catch (_) {}
  }

  async saveProfile() {
    if (!this._sb || !this.state.user) return;
    const name = (this.state.profileName || '').trim();
    if (!name) { this.setState({ profileError: 'กรุณากรอกชื่อ' }); return; }
    this.setState({ profileSaving: true, profileError: '', profileSuccess: '' });
    const { error } = await this._sb.from('profiles').update({ full_name: name, avatar_url: this.state.profileAvatarPreview || null }).eq('id', this.state.user.id);
    if (error) { this.setState({ profileSaving: false, profileError: error.message }); return; }
    this.setState({ profileSaving: false, profileSuccess: 'บันทึกโปรไฟล์แล้ว', userName: name, userAvatar: this.state.profileAvatarPreview || '' });
  }

  async changeMyPassword() {
    const { pwNew, pwConfirm } = this.state;
    if (!pwNew || pwNew.length < 6) { this.setState({ pwError: 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', pwSuccess: '' }); return; }
    if (pwNew !== pwConfirm) { this.setState({ pwError: 'รหัสผ่านไม่ตรงกัน', pwSuccess: '' }); return; }
    this.setState({ pwSaving: true, pwError: '', pwSuccess: '' });
    const { error } = await this._sb.auth.updateUser({ password: pwNew });
    if (error) { this.setState({ pwSaving: false, pwError: error.message }); return; }
    this.setState({ pwSaving: false, pwSuccess: 'เปลี่ยนรหัสผ่านแล้ว', pwNew: '', pwConfirm: '' });
  }

  // ── Period data modifiers (deterministic seed-based) ───────────
  getPeriodMods(month, year) {
    const BASE_M = 7, BASE_Y = 2026;
    const offset = (BASE_Y - year) * 12 + (BASE_M - month);
    const seed = year * 100 + month;
    const ps = (n) => { const x = Math.sin(seed * 9301 + n * 49297) * 43758.5453; return x - Math.floor(x); };
    return {
      offset,
      prog:   (base, i) => Math.max(0,   Math.min(100, Math.round(base - offset * (2 + ps(i) * 4)))),
      bud:    (base, i) => Math.max(0,   Math.round(base * (1 - offset * 0.055 * (0.7 + ps(i+10) * 0.6)) * 100) / 100),
      mAct:   (base, i) => Math.max(0,   Math.round(base * (1 + (ps(i+20) - 0.5) * 0.4) * 100) / 100),
      sec:    (base, i) => Math.max(0,   Math.round(base * (1 + (ps(i+30) - 0.5) * 0.5 + offset * 0.08))),
      lat:    (base, i) => Math.max(5,   Math.round(base * (1 + (ps(i+40) - 0.5) * 0.25))),
      pkt:    (base, i) => Math.max(0,   Math.round((base * (1 + (ps(i+50) - 0.5) * 0.35)) * 100) / 100),
      upt:    (base, i) => Math.max(98.5,Math.min(100, Math.round((base - offset * ps(i+60) * 0.04) * 100) / 100)),
    };
  }
  ganttHeaderRef = React.createRef();
  ganttRowsRightRef = React.createRef();

  ic(d) {
    return React.createElement('svg', {
      width: 15, height: 15, viewBox: '0 0 24 24',
      fill: 'none', stroke: 'currentColor', strokeWidth: 1.75,
      strokeLinecap: 'round', strokeLinejoin: 'round',
      style: { display: 'block', flexShrink: 0 }
    }, React.createElement('path', { d }));
  }

  multiChart(series, months, opts) {
    const { w = 500, h = 140 } = opts || {};
    const px = 36, py = 12, bx = 30;
    const allVals = series.flatMap(s => s.data);
    const mn = Math.min(...allVals) - 0.05;
    const mx = Math.max(...allVals) + 0.05;
    const rng = mx - mn || 0.001;
    const cw = (w - px - bx) / (months.length - 1);
    const ptY = (v) => py + ((mx - v) / rng) * (h - py * 2 - 12);
    const gid = 'mg' + Math.random().toString(36).slice(2,6);
    return React.createElement('svg', { width: '100%', height: h, viewBox: '0 0 ' + w + ' ' + h, style: { display: 'block', overflow: 'visible' } },
      // Y-axis labels
      ...[mn, (mn+mx)/2, mx].map((v, i) =>
        React.createElement('text', { key: i, x: px - 4, y: ptY(v) + 4, textAnchor: 'end', fontSize: 12, fill: '#94a3b8' }, v.toFixed(1) + '%')
      ),
      // Month labels
      ...months.map((m, i) =>
        React.createElement('text', { key: m, x: px + i * cw, y: h - 2, textAnchor: 'middle', fontSize: 12, fill: '#94a3b8' }, m)
      ),
      // Grid lines
      ...[mn, (mn+mx)/2, mx].map((v, i) =>

          const pDeltaColor = pDelta===null ? '#94a3b8' : pDelta > 0 ? '#e11d48' : pDelta < 0 ? '#16a34a' : '#94a3b8';
          rows.push(e('div', { key: ty+'-p-'+g.parent, style:{ display:'grid', gridTemplateColumns:cols, gap:'0 6px', padding:'5px 6px 5px 10px', alignItems:'center' } },
